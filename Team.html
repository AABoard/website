<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Team Updates | AAB</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; padding: 20px 0; }
    .post-card { border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: #fff; display: flex; flex-direction: column; }
    .post-image-container { width: 100%; height: 200px; background: #eee; }
    .post-image-container img { width: 100%; height: 100%; object-fit: cover; }
    .post-content { padding: 1.2rem; }
    .post-title { font-size: 1.2rem; margin: 0.5rem 0; color: #111; }
    .post-meta { font-size: 0.8rem; color: #777; }
    .post-desc { font-size: 0.9rem; color: #444; line-height: 1.5; }
    .loading { text-align: center; padding: 50px; grid-column: 1/-1; }
  </style>
</head>
<body>
  <main class="container">
    <h1 style="margin-top:40px">Team Contributions</h1>
    <div id="team-feed" class="team-grid">
      <div class="loading">Loading posts from Google Sheets...</div>
    </div>
  </main>

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT3yQPCsrjIMIF8W34bATM5UZY22LoUgq9XrFmTwDh9dsvtZR3u7AbQCeDE5obOi7p9uahDAzZn_LzR/pub?output=csv';

    async function initFeed() {
      const feed = document.getElementById('team-feed');
      try {
        const response = await fetch(CSV_URL);
        const data = await response.text();
        
        // This splits by row but respects newlines inside quotes
        const rows = data.match(/(".*?"|[^"\r\n]+)(?=\r?\n|\r|$)/g);
        const entries = rows.slice(1); // Remove header

        feed.innerHTML = '';

        entries.forEach(row => {
          // Splitting columns while ignoring commas inside quotes
          const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
          
          if (cols && cols.length >= 5) {
            const title = cols[1].replace(/"/g, "");
            const desc = cols[2].replace(/"/g, "");
            const date = cols[3].replace(/"/g, "");
            const user = cols[4].replace(/"/g, "");
            const imgLinks = cols[5] ? cols[5].replace(/"/g, "") : "";

            // DRIVE IMAGE CONVERSION
            // Takes 'https://drive.google.com/open?id=123' and makes it a direct image
            let firstImg = 'assets/placeholder.png';
            if (imgLinks.includes('id=')) {
                const id = imgLinks.split('id=')[1].split(',')[0].trim();
                firstImg = `https://lh3.googleusercontent.com/d/${id}`;
            }

            const card = document.createElement('div');
            card.className = 'post-card';
            card.innerHTML = `
              <div class="post-image-container">
                <img src="${firstImg}" alt="Event image" onerror="this.src='https://via.placeholder.com/400x200?text=Image+Private'">
              </div>
              <div class="post-content">
                <div class="post-meta">By ${user} • ${date}</div>
                <h3 class="post-title">${title}</h3>
                <p class="post-desc">${desc.substring(0, 180)}...</p>
              </div>
            `;
            feed.appendChild(card);
          }
        });
      } catch (e) {
        feed.innerHTML = "Failed to load data. Please ensure the spreadsheet is published.";
      }
    }

    initFeed();
  </script>
</body>
</html>
