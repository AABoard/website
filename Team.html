<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support AAB | International AI Assessment Board</title>
  <meta name="description" content="Sign the Letter of Support for the International AI Assessment Board (AAB) and express interest in the Academic Advisory Board." />
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root{
      --blue:#1f4e79;
      --blue-soft:#eef4fb;
      --blue-accent:#2e75b6;
      --text:#1f2937;
      --muted:#4b5563;
      --line:#e5e7eb;
      --bg:#ffffff;
      --surface:#f8fafc;
      --maxw:1120px;
      --radius:14px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.7;
    }

    a{
      color:var(--blue-accent);
      text-decoration:none;
    }

    a:hover{text-decoration:underline}

    .container{
      width:min(var(--maxw), calc(100% - 32px));
      margin:0 auto;
    }

    /* HEADER */

    .site-header{
      position:sticky;
      top:0;
      z-index:50;
      background:white;
      border-bottom:1px solid var(--line);
    }

    .site-header .container{
      display:flex;
      align-items:center;
      justify-content:space-between;
      min-height:64px;
      flex-wrap:wrap;
      gap:16px;
    }

    .brand{
      font-weight:700;
      color:var(--blue);
    }

    .nav{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
    }

    .nav a{
      color:var(--text);
      font-size:0.95rem;
    }

    /* HERO */

    .hero{
      padding:70px 0 60px;
      background:var(--blue-soft);
      border-bottom:1px solid var(--line);
    }

    .hero h1{
      margin:0 0 16px;
      font-size:clamp(2rem,4vw,3rem);
      color:var(--blue);
    }

    .hero p{
      margin:0 0 16px;
      max-width:820px;
      color:var(--muted);
    }

    .hero-actions{
      margin-top:22px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn{
      padding:10px 18px;
      border-radius:10px;
      border:1px solid var(--line);
      background:white;
      font-weight:600;
      cursor:pointer;
    }

    .btn-primary{
      background:var(--blue);
      color:white;
      border:none;
    }

    .btn-primary:hover{
      background:var(--blue-accent);
    }

    section{
      padding:60px 0;
      border-bottom:1px solid var(--line);
    }

    h2{
      margin:0 0 12px;
      color:var(--blue);
      font-size:1.9rem;
    }

    h3{
      margin:0 0 10px;
      color:var(--blue);
      font-size:1.15rem;
    }

    .intro{
      max-width:800px;
      margin-bottom:28px;
      color:var(--muted);
    }

    /* GRID */

    .grid-2{
      display:grid;
      grid-template-columns:1.2fr 0.9fr;
      gap:28px;
    }

    /* CARDS */

    .card{
      background:white;
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:24px;
    }

    .highlight-box{
      background:var(--blue-soft);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:22px;
    }

    .quote{
      font-weight:600;
      color:var(--blue);
    }

    ul{
      padding-left:20px;
    }

    ul li{margin:10px 0}

    /* ORG STRUCTURE */

    .org-chart{
      border:1px solid var(--line);
      background:var(--surface);
      border-radius:var(--radius);
      padding:24px;
      font-family:"Courier New", monospace;
      white-space:pre;
      margin-bottom:26px;
      color:var(--blue);
    }

    .mini-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
    }

    .mini-card{
      border:1px solid var(--line);
      border-radius:12px;
      padding:18px;
      background:white;
    }

    /* STEPS */

    .steps{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:18px;
    }

    .step{
      border:1px solid var(--line);
      border-radius:12px;
      padding:20px;
      background:white;
    }

    .step-number{
      width:32px;
      height:32px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--blue-soft);
      color:var(--blue);
      font-weight:700;
      margin-bottom:10px;
    }

    /* FORM */

    .form-wrap iframe{
      width:100%;
      min-height:900px;
      border:0;
      border-radius:10px;
      background:white;
    }

    footer{
      padding:40px 0;
      text-align:center;
      color:var(--muted);
    }

    footer strong{color:var(--blue)}

    /* MOBILE */

    @media(max-width:900px){

      .grid-2,
      .mini-grid,
      .steps{
        grid-template-columns:1fr;
      }

    }

    .brand{ display:flex; align-items:center; gap: 12px; font-weight: 700; color: var(--accent); }
  .brand-mark{
    width: 52px;
    height: 52px;
    display:block;
    background: transparent;
    border-radius: 0;
    object-fit: contain;
  }
  .brand-text{ font-size: 0.98rem; color: var(--accent); }

  </style>
  <link rel="icon" href="favicon.png" type="image/png" />
</head>

<body>

<header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <img class="brand-mark" src="assets/AAB transparent.png" alt="AI Assessment Board logo" />
        <span class="brand-text">AI Assessment Board (AAB)</span>
      </a>
    <nav class="nav">
      <a href="#about">About</a>
      <a href="aab-launch-announcement.html">News</a>
      <a href="Team.html">Team</a>
      <a href="#structure">Structure</a>
      <a href="#support">Letter of Support</a>
      <a href="#sign">Sign</a>
    </nav>
  </div>
</header>















<footer>

  <div class="container">

    <p><strong>International AI Assessment Board (AAB)</strong></p>

    <p>Building the global evidence infrastructure for AI education.</p>

    <p>
      Contact: info@aaboard.org
    </p>

  </div>

</footer>



</body>
</html>
